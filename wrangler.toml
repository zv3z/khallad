name              = "khallad"
main              = "src/worker.js"
compatibility_date = "2025-01-01"

[assets]
directory = "docs"
binding   = "ASSETS"


# ─── متغيرات البيئة ──────────────────────────────────────────
# ADMIN_KEY: غيّره من لوحة Cloudflare Dashboard > Workers > Settings > Variables
[vars]
ADMIN_KEY = "khallad-admin-2026-change-me"

# ─── بيئة التطوير المحلي (wrangler dev) ──────────────────────
[dev]
port = 8787
local_protocol = "http"
