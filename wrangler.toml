name              = "khallad"
main              = "src/worker.js"
compatibility_date = "2025-01-01"

[assets]
directory = "public"
binding   = "ASSETS"

# ─── Durable Objects: غرف اللعب الأونلاين ────────────────────
[[durable_objects.bindings]]
name       = "ROOMS"
class_name = "GameRoom"

[[migrations]]
tag              = "v1"
new_sqlite_classes = ["GameRoom"]

# ─── D1 Database ─────────────────────────────────────────────
# خطوة الإعداد:
#   1) شغّل:  npx wrangler d1 create khallad-db
#   2) انسخ database_id الناتج وضعه أدناه
[[d1_databases]]
binding       = "DB"
database_name = "khallad-db"
database_id   = "ضع-database_id-هنا-من-wrangler-d1-create"

# ─── متغيرات البيئة ──────────────────────────────────────────
# ADMIN_KEY: غيّره من لوحة Cloudflare Dashboard > Workers > Settings > Variables
[vars]
ADMIN_KEY = "khallad-admin-2026-change-me"

# ─── بيئة التطوير المحلي (wrangler dev) ──────────────────────
[dev]
port = 8787
local_protocol = "http"
