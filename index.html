<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خَلّد — جاري التحميل...</title>
<meta http-equiv="refresh" content="0; url=docs/">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Tajawal',Segoe UI,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#08051a;
    background-image:
      radial-gradient(ellipse 80% 60% at 15% 10%,rgba(147,51,234,.22) 0%,transparent 58%),
      radial-gradient(ellipse 60% 50% at 85% 85%,rgba(6,182,212,.16) 0%,transparent 55%);
    color:#ede9fe;
  }
  .box{text-align:center}
  .logo{
    font-size:72px;font-weight:900;letter-spacing:4px;
    background:linear-gradient(112deg,#22d3ee 5%,#a855f7 35%,#d946ef 65%,#f472b6 95%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shimmer 3s linear infinite;background-size:280% 100%;
    margin-bottom:12px;display:block;
  }
  @keyframes shimmer{to{background-position:280% 0}}
  .sub{font-size:18px;color:rgba(237,233,254,.65);font-weight:700;margin-bottom:32px}
  .spinner{
    width:52px;height:52px;border-radius:50%;margin:0 auto 20px;
    border:4px solid rgba(255,255,255,.1);
    border-top-color:#a855f7;
    animation:spin .9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{font-size:14px;color:rgba(237,233,254,.45);font-weight:700}
  a{color:#a855f7;text-decoration:none}
</style>
</head>
<body>
<div class="box">
  <span class="logo">خَلّـد</span>
  <div class="sub">منصة ألعاب أبو خالد 🎮</div>
  <div class="spinner"></div>
  <div class="msg">جاري التحميل... <a href="docs/">اضغط هنا إذا لم يتم التحويل تلقائياً</a></div>
</div>
<script>
  // Redirect immediately — fallback if meta refresh is blocked
  (function(){
    var p = location.pathname.replace(/\/?$/, '/');
    if (!p.endsWith('/docs/') && !location.href.includes('/docs/')) {
      location.replace(p + 'docs/');
    }
  })();
</script>
</body>
</html>
