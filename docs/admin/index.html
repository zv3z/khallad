<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>خَلّد — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Lalezar&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0920;--panel:#1a0d3d;--border:#ffffff18;--vio:#8b5cf6;--mag:#d946ef;--cyan:#22d3ee;--grn:#34d399;--red:#fb7185;--amber:#fbbf24;--ink:#f3f0ff;--muted:#8d84c9}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:420px;text-align:center}
.logo{font-family:'Lalezar';font-size:52px;background:linear-gradient(100deg,var(--cyan),var(--vio),var(--mag));-webkit-background-clip:text;background-clip:text;color:transparent}
h2{font-family:'Lalezar';font-size:22px;color:var(--muted);margin:8px 0 28px}
input{width:100%;background:#150b33;border:1.5px solid var(--border);border-radius:14px;color:var(--ink);font-family:inherit;font-size:15px;font-weight:700;padding:13px 16px;outline:none;margin-bottom:14px;transition:.2s}
input:focus{border-color:var(--vio);box-shadow:0 0 16px #8b5cf630}
.btn{font-family:'Lalezar';cursor:pointer;border:none;border-radius:14px;font-size:18px;padding:12px 28px;transition:.2s;width:100%}
.btn-main{background:linear-gradient(95deg,var(--vio),var(--mag));color:#fff}
.btn-main:hover{opacity:.88;transform:translateY(-1px)}
.err{color:var(--red);font-weight:800;font-size:13px;margin-top:8px}
/* Dashboard */
.dash{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:16px 24px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap}
.topbar .logo{font-size:28px}
.topbar h1{font-family:'Lalezar';font-size:20px;color:var(--muted)}
.topbar .ml{margin-inline-start:auto}
.btn-sm{font-family:'Lalezar';cursor:pointer;border:none;border-radius:10px;font-size:14px;padding:7px 16px;transition:.15s}
.btn-danger{background:#7f1d1d;color:var(--red);border:1px solid var(--red)44}
.btn-success{background:#064e3b;color:var(--grn);border:1px solid var(--grn)44}
.btn-ghost{background:#ffffff12;color:var(--ink);border:1px solid var(--border)}
.tabs{display:flex;gap:0;padding:0 24px;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{font-family:'Lalezar';font-size:16px;padding:14px 22px;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;transition:.15s;white-space:nowrap}
.tab.on{color:var(--cyan);border-color:var(--cyan)}
.content{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}
/* Stats cards */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px 18px;text-align:center}
.stat .n{font-family:'Lalezar';font-size:44px;line-height:1}
.stat .l{font-size:13px;color:var(--muted);font-weight:700;margin-top:4px}
.stat.q .n{color:var(--cyan)} .stat.p .n{color:var(--amber)} .stat.s .n{color:var(--grn)} .stat.u .n{color:var(--mag)}
/* Table */
.tbl-wrap{background:var(--panel);border:1px solid var(--border);border-radius:18px;overflow:hidden}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.tbl-head h3{font-family:'Lalezar';font-size:18px}
.filter{display:flex;gap:8px;flex-wrap:wrap}
.filter select,.filter input{background:#150b33;border:1px solid var(--border);border-radius:10px;color:var(--ink);font-family:inherit;font-weight:700;padding:7px 12px;outline:none;font-size:13px}
table{width:100%;border-collapse:collapse}
th{font-size:12px;font-weight:800;color:var(--muted);padding:10px 14px;text-align:right;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13.5px;font-weight:700;border-bottom:1px solid #ffffff08;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#ffffff05}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:800}
.badge-ok{background:#064e3b;color:var(--grn)} .badge-wait{background:#451a03;color:var(--amber)}
.pts{display:inline-block;padding:2px 9px;border-radius:8px;font-size:12px;font-weight:800}
.p200{background:#0e7490;color:#fff}.p400{background:#6d28d9;color:#fff}.p600{background:#be185d;color:#fff}
.act-btns{display:flex;gap:6px;flex-wrap:wrap}
.empty{text-align:center;padding:40px;color:var(--muted);font-weight:700}
.pagination{display:flex;align-items:center;gap:8px;justify-content:center;padding:16px}
.pagination button{font-family:'Lalezar';background:#ffffff12;border:1px solid var(--border);border-radius:10px;color:var(--ink);padding:6px 14px;cursor:pointer;font-size:14px}
.pagination button:disabled{opacity:.3;cursor:not-allowed}
/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;padding:12px 22px;border-radius:14px;font-weight:800;font-size:14px;pointer-events:none;transition:opacity .3s;opacity:0}
</style>
</head>
<body>

<!-- Login -->
<div class="login" id="loginView">
  <div class="login-box">
    <div class="logo">خَلّد</div>
    <h2>لوحة الإدارة 🔐</h2>
    <input type="password" id="keyInput" placeholder="مفتاح الإدارة..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-main" onclick="doLogin()">دخول 🚀</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dash" id="dashView">
  <div class="topbar">
    <div class="logo">خَلّد</div>
    <h1>لوحة الإدارة</h1>
    <div class="ml" style="display:flex;gap:8px">
      <a href="/" class="btn-sm btn-ghost" style="text-decoration:none;font-family:Lalezar">← الموقع</a>
      <button class="btn-sm btn-danger" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="switchTab('pending')"  id="tab-pending">⏳ أسئلة معلّقة</div>
    <div class="tab"    onclick="switchTab('approved')" id="tab-approved">✅ أسئلة معتمدة</div>
    <div class="tab"    onclick="switchTab('scores')"   id="tab-scores">🏆 النتائج</div>
    <div class="tab"    onclick="switchTab('users')"    id="tab-users">👥 المستخدمون</div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats" id="stats">
      <div class="stat q"><div class="n" id="sQ">…</div><div class="l">أسئلة معتمدة</div></div>
      <div class="stat p"><div class="n" id="sP">…</div><div class="l">بانتظار الاعتماد</div></div>
      <div class="stat s"><div class="n" id="sS">…</div><div class="l">جلسات لعب</div></div>
      <div class="stat u"><div class="n" id="sU">…</div><div class="l">مستخدمون</div></div>
    </div>

    <!-- Main table -->
    <div class="tbl-wrap" id="mainTable">
      <div class="tbl-head">
        <h3 id="tblTitle">⏳ أسئلة معلّقة</h3>
        <div class="filter" id="tblFilter"></div>
      </div>
      <div id="tblBody"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
let ADMIN_KEY = '', currentTab = 'pending', currentPage = 0;

function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.cssText += `background:${ok?'#064e3b':'#3b0764'};color:${ok?'#34d399':'#f472b6'};border:1px solid ${ok?'#34d39944':'#f472b644'};opacity:1`;
  setTimeout(() => el.style.opacity = '0', 2800);
}

async function api(path, opts = {}) {
  const r = await fetch('/api' + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY, ...(opts.headers||{}) },
  });
  return r.json();
}

async function doLogin() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) return;
  ADMIN_KEY = key;
  const data = await api('/admin/stats').catch(() => null);
  if (!data || data.error) {
    document.getElementById('loginErr').textContent = 'مفتاح خاطئ أو السيرفر غير متاح';
    ADMIN_KEY = '';
    return;
  }
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('dashView').style.display  = 'flex';
  sessionStorage.setItem('admin_key', key);
  fillStats(data);
  loadTab('pending');
}

function logout() {
  sessionStorage.removeItem('admin_key');
  location.reload();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-' + tab).classList.add('on');
  currentTab = tab; currentPage = 0;
  loadTab(tab);
}

function fillStats(d) {
  document.getElementById('sQ').textContent = (d.approved  || 0).toLocaleString('ar-EG');
  document.getElementById('sP').textContent = (d.pending   || 0).toLocaleString('ar-EG');
  document.getElementById('sS').textContent = (d.scores    || 0).toLocaleString('ar-EG');
  document.getElementById('sU').textContent = (d.users     || 0).toLocaleString('ar-EG');
}

async function loadTab(tab) {
  const body = document.getElementById('tblBody');
  const filter = document.getElementById('tblFilter');
  body.innerHTML = '<div class="empty">⏳ جاري التحميل...</div>';
  filter.innerHTML = '';

  if (tab === 'pending' || tab === 'approved') {
    document.getElementById('tblTitle').textContent = tab === 'pending' ? '⏳ أسئلة معلّقة' : '✅ أسئلة معتمدة';
    const data = await api(`/admin/questions?approved=${tab==='approved'?1:0}&page=${currentPage}`);
    renderQuestions(data, tab === 'pending');
  } else if (tab === 'scores') {
    document.getElementById('tblTitle').textContent = '🏆 سجل النتائج';
    const data = await api('/admin/scores');
    renderScores(data);
  } else if (tab === 'users') {
    document.getElementById('tblTitle').textContent = '👥 المستخدمون';
    const data = await api('/admin/users');
    renderUsers(data);
  }
}

function renderQuestions(rows, canApprove) {
  const body = document.getElementById('tblBody');
  if (!rows?.length) { body.innerHTML = '<div class="empty">لا توجد أسئلة</div>'; return; }
  body.innerHTML = `<table>
    <thead><tr><th>الفئة</th><th>نقاط</th><th>السؤال</th><th>الجواب</th><th>أضافه</th><th>الإجراء</th></tr></thead>
    <tbody>${rows.map(q => `
    <tr id="qrow-${q.id}">
      <td>${esc(q.cat)}</td>
      <td><span class="pts p${q.p}">${q.p}</span></td>
      <td style="max-width:220px">${esc(q.q)}</td>
      <td style="max-width:150px;color:#34d399">${esc(q.a)}</td>
      <td style="color:var(--muted)">${esc(q.by_user||'—')}</td>
      <td><div class="act-btns">
        ${canApprove ? `<button class="btn-sm btn-success" onclick="approveQ(${q.id})">✅ اعتماد</button>` : ''}
        <button class="btn-sm btn-danger" onclick="deleteQ(${q.id})">🗑 حذف</button>
      </div></td>
    </tr>`).join('')}
    </tbody></table>
    <div class="pagination">
      <button ${currentPage===0?'disabled':''} onclick="prevPage()">⬅ السابق</button>
      <span style="font-weight:800;color:var(--muted)">صفحة ${currentPage+1}</span>
      <button ${rows.length<50?'disabled':''} onclick="nextPage()">التالي ➡</button>
    </div>`;
}

function renderScores(rows) {
  const body = document.getElementById('tblBody');
  if (!rows?.length) { body.innerHTML = '<div class="empty">لا توجد نتائج</div>'; return; }
  body.innerHTML = `<table>
    <thead><tr><th>اللعبة</th><th>الاسم</th><th>النقاط</th><th>المستخدم</th><th>التاريخ</th><th>حذف</th></tr></thead>
    <tbody>${rows.map(s => `
    <tr id="srow-${s.id}">
      <td>${esc(s.game)}</td>
      <td style="font-family:Lalezar;font-size:16px">${esc(s.name)}</td>
      <td style="font-family:Lalezar;font-size:20px;color:var(--amber)">${s.score}</td>
      <td style="color:var(--muted)">${esc(s.by_user||'—')}</td>
      <td style="color:var(--muted);font-size:12px">${new Date(s.created).toLocaleDateString('ar-SA')}</td>
      <td><button class="btn-sm btn-danger" onclick="deleteScore(${s.id})">🗑</button></td>
    </tr>`).join('')}
    </tbody></table>`;
}

function renderUsers(rows) {
  const body = document.getElementById('tblBody');
  if (!rows?.length) { body.innerHTML = '<div class="empty">لا يوجد مستخدمون</div>'; return; }
  body.innerHTML = `<table>
    <thead><tr><th>الاسم</th><th>البريد</th><th>تاريخ التسجيل</th></tr></thead>
    <tbody>${rows.map(u => `
    <tr>
      <td style="font-weight:800">${esc(u.name||'—')}</td>
      <td style="color:var(--muted)">${esc(u.email||'—')}</td>
      <td style="color:var(--muted);font-size:12px">${new Date(u.created).toLocaleDateString('ar-SA')}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

async function approveQ(id) {
  const r = await api(`/admin/questions/${id}/approve`, { method: 'POST' });
  if (r.ok) { document.getElementById('qrow-' + id)?.remove(); toast('تم اعتماد السؤال ✅'); refreshStats(); }
  else toast('فشل الاعتماد', false);
}
async function deleteQ(id) {
  if (!confirm('حذف هذا السؤال؟')) return;
  const r = await api(`/admin/questions/${id}`, { method: 'DELETE' });
  if (r.ok) { document.getElementById('qrow-' + id)?.remove(); toast('تم حذف السؤال 🗑'); refreshStats(); }
  else toast('فشل الحذف', false);
}
async function deleteScore(id) {
  if (!confirm('حذف هذه النتيجة؟')) return;
  const r = await api(`/admin/scores/${id}`, { method: 'DELETE' });
  if (r.ok) { document.getElementById('srow-' + id)?.remove(); toast('تم الحذف 🗑'); }
  else toast('فشل الحذف', false);
}
async function refreshStats() {
  const d = await api('/admin/stats').catch(() => null);
  if (d) fillStats(d);
}
function prevPage() { if (currentPage > 0) { currentPage--; loadTab(currentTab); } }
function nextPage() { currentPage++; loadTab(currentTab); }

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// تسجيل دخول تلقائي إذا كان المفتاح محفوظاً
window.onload = () => {
  const saved = sessionStorage.getItem('admin_key');
  if (saved) { document.getElementById('keyInput').value = saved; doLogin(); }
};
</script>
</body>
</html>
